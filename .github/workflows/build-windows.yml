name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.38.10"

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022

    steps:
      - name: Enable long paths
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: Show tool versions
        run: |
          flutter --version
          rustc --version
          cargo --version

      - name: Upgrade gal Windows build fix
        working-directory: app
        run: flutter pub add gal:2.3.2

      - name: Apply Windows source fixes
        working-directory: app
        shell: pwsh
        run: |
          $runnerPath = "windows/runner/CMakeLists.txt"
          $runner = Get-Content -Path $runnerPath -Raw

          $oldLink = 'target_link_libraries(${BINARY_NAME} PRIVATE "dwmapi.lib")'
          $newLink = 'target_link_libraries(${BINARY_NAME} PRIVATE "dwmapi.lib" windowsapp)'

          if (-not $runner.Contains($oldLink)) {
            throw "Expected runner CMake link line was not found."
          }

          Set-Content -Path $runnerPath -Value $runner.Replace($oldLink, $newLink) -NoNewline

          $cmakePath = "windows/CMakeLists.txt"
          $cmake = Get-Content -Path $cmakePath -Raw

          $cmake = [regex]::Replace(
            $cmake,
            '(?m)^\s*"localsend_msix_helper\.msix"\r?\n',
            ''
          )

          $cmake = [regex]::Replace(
            $cmake,
            '(?m)^\s*"install_msix_helper\.ps1"\r?\n',
            ''
          )

          if ($cmake.Contains('"localsend_msix_helper.msix"')) {
            throw "Failed to remove missing MSIX helper."
          }

          Set-Content -Path $cmakePath -Value $cmake -NoNewline

      - name: Build Windows
        working-directory: app
        run: flutter build windows --release

      - name: Add settings file
        working-directory: app
        run: Set-Content -Path build/windows/x64/runner/Release/settings.json -Value "{}"

      - name: Add Visual C++ runtime DLLs
        working-directory: app
        run: |
          Copy-Item ../scripts/windows/x64/msvcp140.dll build/windows/x64/runner/Release/
          Copy-Item ../scripts/windows/x64/vcruntime140.dll build/windows/x64/runner/Release/
          Copy-Item ../scripts/windows/x64/vcruntime140_1.dll build/windows/x64/runner/Release/

      - name: Package Windows build
        working-directory: app
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath LocalSend-Windows-x64.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v6
        with:
          name: LocalSend-Windows-x64
          path: app/LocalSend-Windows-x64.zip
          retention-days: 7
